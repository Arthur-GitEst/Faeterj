<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Javascript</title>
    <style>
        div {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .hidden {
            display: hidden;
        }
    </style>
</head>
<body>
    <div>
        <input type="text" id="n1">
        <input type="text" id="n2">
        <br>
        <select name="seletor" id="seletor">
            <option value="somar">Somar</option>
            <option value="subtrair">Subtrair</option>
            <option value="multiplicar">Multiplicar</option>
            <option value="dividir">Dividir</option>
        </select>
        <br>
        <button onclick="Calcular()">Calcular</button>
        <br><br>
        <p id="resultado" class="hidden"></p>
    </div>
    
</body>
<script>
    const Calcular = () => {
        const n1 = document.getElementById("n1").value;
        const n2 = document.getElementById("n2").value;
        const resultado = document.getElementById("resultado");
        const operacao = document.getElementById("seletor").value;

        switch(operacao) {
            case "somar":
                resultado.innerText = "Resultado: " + (Number(n1) + Number(n2));
                resultado.classList.toggle("hidden");
                break;
            case "subtrair":
                resultado.innerText = "Resultado: " + (Number(n1) - Number(n2));
                resultado.classList.toggle("hidden");
                break;
            case "multiplicar":
                resultado.innerText = "Resultado: " + (Number(n1) * Number(n2));
                resultado.classList.toggle("hidden");
                break;
            case "dividir":
                resultado.innerText = "Resultado: " + (Number(n1) / Number(n2));
                resultado.classList.toggle("hidden");
                break;
        }
    }
</script>
</html>
